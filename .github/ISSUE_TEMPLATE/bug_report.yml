name: Bug Report
description: Report a reproducible bug in Zion
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please search [existing issues](https://github.com/lxxyaz-cmd/zion/issues) to avoid duplicates.

  - type: input
    id: zion-version
    attributes:
      label: Zion version
      placeholder: "e.g. 0.2.0"
    validations:
      required: true

  - type: input
    id: threejs-version
    attributes:
      label: Three.js version
      placeholder: "e.g. 0.177.0"
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g. Chrome 126, Node 20, Vite 5"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Paste a minimal code snippet or link to a CodePen/JSFiddle that reproduces the issue.
      render: javascript
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console output / stack trace
      render: text
